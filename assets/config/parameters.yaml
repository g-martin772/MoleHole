# MoleHole Parameter Definitions
# This file defines all application parameters with their metadata
# The system automatically loads these and handles serialization/UI generation

parameters:
  # Window Parameters
  - name: "Window.Width"
    displayName: "Window Width"
    tooltip: "Width of the application window"
    type: int
    group: Window
    defaultValue: 800
    minValue: 640
    maxValue: 7680
    showInUI: false
    isReadOnly: false

  - name: "Window.Height"
    displayName: "Window Height"
    tooltip: "Height of the application window"
    type: int
    group: Window
    defaultValue: 600
    minValue: 480
    maxValue: 4320
    showInUI: false

  - name: "Window.PosX"
    displayName: "Window X Position"
    tooltip: "X position of the application window"
    type: int
    group: Window
    defaultValue: -1
    showInUI: false

  - name: "Window.PosY"
    displayName: "Window Y Position"
    tooltip: "Y position of the application window"
    type: int
    group: Window
    defaultValue: -1
    showInUI: false

  - name: "Window.Maximized"
    displayName: "Window Maximized"
    tooltip: "Whether the window is maximized"
    type: bool
    group: Window
    defaultValue: false
    showInUI: false

  - name: "Window.VSync"
    displayName: "VSync"
    tooltip: "Enable vertical synchronization"
    type: bool
    group: Window
    defaultValue: true
    showInUI: true

  # Camera Parameters
  - name: "Camera.Position"
    displayName: "Camera Position"
    tooltip: "Camera position in world space"
    type: vec3
    group: Camera
    defaultValue: [0.0, 0.0, 5.0]
    showInUI: true

  - name: "Camera.Front"
    displayName: "Camera Front"
    tooltip: "Camera forward direction vector"
    type: vec3
    group: Camera
    defaultValue: [0.0, 0.0, -1.0]
    showInUI: false

  - name: "Camera.Up"
    displayName: "Camera Up"
    tooltip: "Camera up direction vector"
    type: vec3
    group: Camera
    defaultValue: [0.0, 1.0, 0.0]
    showInUI: false

  - name: "Camera.Pitch"
    displayName: "Camera Pitch"
    tooltip: "Camera pitch angle in degrees"
    type: float
    group: Camera
    defaultValue: 0.0
    minValue: -89.0
    maxValue: 89.0
    showInUI: true

  - name: "Camera.Yaw"
    displayName: "Camera Yaw"
    tooltip: "Camera yaw angle in degrees"
    type: float
    group: Camera
    defaultValue: -90.0
    showInUI: true

  - name: "Camera.Speed"
    displayName: "Camera Speed"
    tooltip: "Camera movement speed"
    type: float
    group: Camera
    defaultValue: 5.0
    minValue: 0.1
    maxValue: 100.0
    dragSpeed: 0.1
    showInUI: true

  - name: "Camera.MouseSensitivity"
    displayName: "Mouse Sensitivity"
    tooltip: "Mouse look sensitivity"
    type: float
    group: Camera
    defaultValue: 0.1
    minValue: 0.01
    maxValue: 1.0
    dragSpeed: 0.01
    showInUI: true

  - name: "Camera.Object"
    displayName: "Camera Object"
    tooltip: "Select a mesh as the camera object"
    type: string
    group: Camera
    defaultValue: ""
    showInUI: false

  # Rendering Parameters
  - name: "Rendering.FOV"
    displayName: "Field of View"
    tooltip: "Camera field of view in degrees"
    type: float
    group: Rendering
    defaultValue: 45.0
    minValue: 1.0
    maxValue: 120.0
    dragSpeed: 0.1
    showInUI: true

  - name: "Rendering.ThirdPerson"
    displayName: "Toggle Third Person Perspective"
    tooltip: "Toggle third person perspective mode"
    type: bool
    group: Rendering
    defaultValue: false
    showInUI: true

  - name: "Video.RayTracingMode"
    displayName: "Ray Tracing Mode"
    tooltip: "0 = Euclidean (Straight Rays), 1 = Kerr (Curved Rays)"
    type: int
    group: Video
    defaultValue: 0
    minValue: 0
    maxValue: 1
    showInUI: true

  - name: "Video.RayMarchSteps"
    displayName: "Max Ray Steps"
    tooltip: "Maximum number of steps for ray marching"
    type: int
    group: Video
    defaultValue: 100
    minValue: 10
    maxValue: 1000
    dragSpeed: 1.0
    showInUI: true

  - name: "Video.RayMarchStepSize"
    displayName: "Step Size"
    tooltip: "Base step size for ray marching integration"
    type: float
    group: Video
    defaultValue: 0.1
    minValue: 0.001
    maxValue: 10.0
    dragSpeed: 0.01
    showInUI: true

  - name: "Rendering.ThirdPersonDistance"
    displayName: "Third Person Distance"
    tooltip: "Distance of camera behind the object in third-person mode"
    type: float
    group: Rendering
    defaultValue: 10.0
    minValue: 1.0
    maxValue: 100.0
    dragSpeed: 0.5
    showInUI: true

  - name: "Rendering.ThirdPersonHeight"
    displayName: "Third Person Height"
    tooltip: "Height of camera above the object in third-person mode"
    type: float
    group: Rendering
    defaultValue: 3.0
    minValue: 0.0
    maxValue: 50.0
    dragSpeed: 0.2
    showInUI: true

  - name: "Rendering.MaxRaySteps"
    displayName: "Max Ray Steps"
    tooltip: "Maximum number of raytracing steps"
    type: int
    group: Rendering
    defaultValue: 1000
    minValue: 100
    maxValue: 10000
    showInUI: true

  - name: "Rendering.RayStepSize"
    displayName: "Ray Step Size"
    tooltip: "Size of each raytracing step"
    type: float
    group: Rendering
    defaultValue: 0.01
    minValue: 0.001
    maxValue: 1.0
    dragSpeed: 0.001
    showInUI: true

  - name: "Rendering.AdaptiveStepRate"
    displayName: "Minimal Value for Adaptive Step Rate"
    tooltip: "Minimal Value for Adaptive Step Rate in raytracing"
    type: float
    group: Rendering
    defaultValue: 0.1
    minValue: 0.000000000001
    maxValue: 10.0
    dragSpeed: 0.001
    showInUI: true

  - name: "Rendering.DebugMode"
    displayName: "Debug Mode"
    tooltip: "Rendering debug visualization mode"
    type: int
    group: Debug
    defaultValue: 0
    showInUI: true

  - name: "Rendering.PhysicsDebugEnabled"
    displayName: "Physics Debug"
    tooltip: "Enable physics debug visualization"
    type: bool
    group: Debug
    defaultValue: false
    showInUI: true

  - name: "Rendering.PhysicsDebugDepthTest"
    displayName: "Physics Debug Depth Test"
    tooltip: "Enable depth testing for physics debug rendering"
    type: bool
    group: Debug
    defaultValue: true
    showInUI: true

  - name: "Rendering.PhysicsDebugScale"
    displayName: "Physics Debug Scale"
    tooltip: "Scale of physics debug visualization"
    type: float
    group: Debug
    defaultValue: 1.0
    minValue: 0.1
    maxValue: 10.0
    dragSpeed: 0.1
    showInUI: true

  - name: "Rendering.PhysicsDebugFlags"
    displayName: "Physics Debug Flags"
    tooltip: "Flags for physics debug rendering"
    type: int
    group: Debug
    defaultValue: 0
    showInUI: false

  - name: "Rendering.BlackHolesEnabled"
    displayName: "Render Black Holes"
    tooltip: "Enable black hole rendering"
    type: bool
    group: Rendering
    defaultValue: true
    showInUI: true

  - name: "Rendering.AccretionDiskEnabled"
    displayName: "Accretion Disk"
    tooltip: "Enable accretion disk rendering"
    type: bool
    group: Rendering
    defaultValue: true
    showInUI: true

  - name: "Rendering.AccretionDiskVolumetric"
    displayName: "Volumetric Disk"
    tooltip: "Use volumetric rendering for accretion disk (cloud-like with proper density, scattering, and self-shadowing)"
    type: bool
    group: Rendering
    defaultValue: false
    showInUI: true

  - name: "Rendering.AccDiskHeight"
    displayName: "Accretion Disk Height"
    tooltip: "Height of the accretion disk"
    type: float
    group: Rendering
    defaultValue: 0.2
    minValue: 0.01
    maxValue: 5.0
    dragSpeed: 0.01
    showInUI: true

  - name: "Rendering.AccDiskNoiseScale"
    displayName: "Disk Noise Scale"
    tooltip: "Scale of noise texture on accretion disk"
    type: float
    group: Rendering
    defaultValue: 1.0
    minValue: 0.1
    maxValue: 10.0
    dragSpeed: 0.1
    showInUI: true

  - name: "Rendering.AccDiskNoiseLOD"
    displayName: "Disk Noise LOD"
    tooltip: "Level of detail for accretion disk noise"
    type: float
    group: Rendering
    defaultValue: 5.0
    minValue: 1.0
    maxValue: 10.0
    dragSpeed: 0.1
    showInUI: true

  - name: "Rendering.AccDiskSpeed"
    displayName: "Disk Rotation Speed"
    tooltip: "Rotation speed of the accretion disk"
    type: float
    group: Rendering
    defaultValue: 0.5
    minValue: 0.0
    maxValue: 5.0
    dragSpeed: 0.1
    showInUI: true

  - name: "Rendering.DopplerBeamingEnabled"
    displayName: "Doppler Beaming"
    tooltip: "Enable relativistic Doppler beaming effect"
    type: bool
    group: Rendering
    defaultValue: true
    showInUI: true

  - name: "Rendering.BloomEnabled"
    displayName: "Bloom Effect"
    tooltip: "Enable bloom post-processing"
    type: bool
    group: Rendering
    defaultValue: true
    showInUI: true

  - name: "Rendering.BloomThreshold"
    displayName: "Bloom Threshold"
    tooltip: "Brightness threshold for bloom effect"
    type: float
    group: Rendering
    defaultValue: 1.0
    minValue: 0.0
    maxValue: 5.0
    dragSpeed: 0.1
    showInUI: true

  - name: "Rendering.BloomBlurPasses"
    displayName: "Bloom Blur Passes"
    tooltip: "Number of blur passes for bloom"
    type: int
    group: Rendering
    defaultValue: 7
    minValue: 1
    maxValue: 20
    showInUI: true

  - name: "Rendering.BloomIntensity"
    displayName: "Bloom Intensity"
    tooltip: "Intensity of the bloom effect"
    type: float
    group: Rendering
    defaultValue: 1.0
    minValue: 0.0
    maxValue: 100.0
    dragSpeed: 0.1
    showInUI: true

  - name: "Rendering.BloomDebug"
    displayName: "Bloom Debug"
    tooltip: "Debug bloom rendering"
    type: bool
    group: Debug
    defaultValue: false
    showInUI: true

  - name: "Rendering.LensFlareEnabled"
    displayName: "Lens Flare"
    tooltip: "Enable lens flare post-processing"
    type: bool
    group: Rendering
    defaultValue: true
    showInUI: true

  - name: "Rendering.LensFlareIntensity"
    displayName: "Lens Flare Intensity"
    tooltip: "Intensity of the lens flare effect"
    type: float
    group: Rendering
    defaultValue: 1.0
    minValue: 0.0
    maxValue: 100.0
    dragSpeed: 0.1
    showInUI: true

  - name: "Rendering.LensFlareThreshold"
    displayName: "Lens Flare Threshold"
    tooltip: "Brightness threshold for lens flare effect"
    type: float
    group: Rendering
    defaultValue: 1.0
    minValue: 0.0
    maxValue: 5.0
    dragSpeed: 0.1
    showInUI: true

  - name: "Rendering.AntiAliasingEnabled"
    displayName: "Anti-Aliasing (FXAA)"
    tooltip: "Enable FXAA anti-aliasing post-processing"
    type: bool
    group: Rendering
    defaultValue: true
    showInUI: true

  # General Relativity Parameters
  - name: "GeneralRelativity.KerrPhysicsEnabled"
    displayName: "Kerr Physics"
    tooltip: "Enable Kerr metric physics for rotating black holes"
    type: bool
    group: GeneralRelativity
    defaultValue: true
    showInUI: true

  - name: "GeneralRelativity.PhotonRingEnabled"
    displayName: "Photon Ring"
    tooltip: "Enable the photon ring"
    type: bool
    group: GeneralRelativity
    defaultValue: true
    showInUI: true

  - name: "GeneralRelativity.AngularMomentumEnabled"
    displayName: "AngularMomentum"
    tooltip: "Enable Angular Momentum"
    type: bool
    group: GeneralRelativity
    defaultValue: true
    showInUI: true

  - name: "GeneralRelativity.FrameDraggingEnabled"
    displayName: "Frame Dragging"
    tooltip: "Enable Frame Dragging"
    type: bool
    group: GeneralRelativity
    defaultValue: true
    showInUI: true

  - name: "GeneralRelativity.GravitationalLensingEnabled"
    displayName: "Gravitational Lensing"
    tooltip: "Enable Gravitational Lensing"
    type: bool
    group: GeneralRelativity
    defaultValue: true
    showInUI: true

  - name: "GeneralRelativity.GravitationalRedshiftEnabled"
    displayName: "Gravitational Redshift"
    tooltip: "Enable gravitational redshift effect"
    type: bool
    group: GeneralRelativity
    defaultValue: true
    showInUI: true

  # Application Parameters
  - name: "App.LastOpenScene"
    displayName: "Last Opened Scene"
    tooltip: "Path to the last opened scene file"
    type: string
    group: Application
    defaultValue: ""
    showInUI: false

  - name: "App.RecentScenes"
    displayName: "Recent Scenes"
    tooltip: "List of recently opened scene files"
    type: string_vector
    group: Application
    defaultValue: []
    showInUI: false

  - name: "App.ShowDemoWindow"
    displayName: "Show ImGui Demo"
    tooltip: "Show the ImGui demo window"
    type: bool
    group: Application
    defaultValue: false
    showInUI: true

  - name: "App.DebugMode"
    displayName: "Application Debug Mode"
    tooltip: "Application-level debug mode"
    type: int
    group: Debug
    defaultValue: 0
    showInUI: true

  - name: "App.UseKerrDistortion"
    displayName: "Use Kerr Metric"
    tooltip: "Use Kerr metric for rotating black holes"
    type: bool
    group: Application
    defaultValue: true
    showInUI: true

  - name: "App.IntroAnimationEnabled"
    displayName: "Enable Intro Animation"
    tooltip: "Show Intro Animation on Startup"
    type: bool
    group: Application
    defaultValue: true
    showInUI: true

  - name: "App.BackgroundImage"
    displayName: "Background Image"
    tooltip: "HDR background image for the skybox"
    type: string
    group: Application
    defaultValue: "space.hdr"
    showInUI: true

  - name: "App.TutorialCompleted"
    displayName: "Tutorial Completed"
    tooltip: "Whether the first-run tutorial has been completed or skipped"
    type: bool
    group: Application
    defaultValue: false
    showInUI: false

  # UI Parameters
  - name: "UI.FontSize"
    displayName: "Font Size"
    tooltip: "Application UI font size"
    type: float
    group: Application
    defaultValue: 16.0
    minValue: 10.0
    maxValue: 32.0
    dragSpeed: 1.0
    showInUI: true

  - name: "UI.MainFont"
    displayName: "Main Font"
    tooltip: "Main application font"
    type: string
    group: Application
    defaultValue: "Roboto-Regular.ttf"
    showInUI: true

  - name: "UI.DefaultExportPath"
    displayName: "Default Export Path"
    tooltip: "Default path for exporting screenshots and videos"
    type: string
    group: Application
    defaultValue: "."
    showInUI: true

  - name: "UI.ViewportHUDEnabled"
    displayName: "Viewport HUD"
    tooltip: "Show viewport heads-up display with camera info and performance stats"
    type: bool
    group: Application
    defaultValue: false
    showInUI: true

# Scene Object Parameters
scene_parameters:
  # Entity Parameters
  - name: "Entity.Name"
    displayName: "Name"
    tooltip: "Name of the object"
    type: string
    group: Simulation
    defaultValue: "Object"
    showInUI: true

  - name: "Entity.Position"
    displayName: "Position"
    tooltip: "Position in 3D space"
    type: vec3
    group: Simulation
    defaultValue: [0.0, 0.0, 0.0]
    scaleValueNames: ["m", "km", "AU", "ly"]
    scaleValues: [1.0, 1000.0, 149597870700.0, 9460730472580800.0]
    showInUI: true

  - name: "Entity.Rotation"
    displayName: "Rotation"
    tooltip: "Rotation quaternion (w, x, y, z)"
    type: quat
    group: Simulation
    defaultValue: [1.0, 0.0, 0.0, 0.0]
    showInUI: true

  - name: "Entity.Scale"
    displayName: "Scale"
    tooltip: "Scale factor in 3D space"
    type: vec3
    group: Simulation
    defaultValue: [1.0, 1.0, 1.0]
    scaleValueNames: ["1x", "10x", "100x", "1000x"]
    scaleValues: [1.0, 10.0, 100.0, 1000.0]
    showInUI: true

  # Physics Parameters
  - name: "Physics.Enable"
    displayName: "Enable Physics"
    tooltip: "Enable physics simulation for this object"
    type: bool
    group: Simulation
    defaultValue: true
    showInUI: true

  - name: "Physics.Mass"
    displayName: "Mass"
    tooltip: "Physical mass"
    type: float
    group: Simulation
    defaultValue: 1000.0
    minValue: 0.0
    maxValue: 1.0e38
    dragSpeed: 1000.0
    scaleValueNames: ["kg", "tons", "SM", "1000 SM", "10⁶ SM"]
    scaleValues: [1.0, 1000.0, 1.989e30, 1.989e33, 1.989e36]
    showInUI: true

  - name: "Physics.Velocity"
    displayName: "Velocity"
    tooltip: "Initial velocity vector"
    type: vec3
    group: Simulation
    defaultValue: [0.0, 0.0, 0.0]
    scaleValueNames: ["m/s", "km/s", "km/h", "c (light speed)"]
    scaleValues: [1.0, 1000.0, 0.277778, 299792458.0]
    showInUI: true

  - name: "Physics.Rigidbody.Type"
    displayName: "Rigidbody Type"
    tooltip: "Type of rigidbody (Dynamic, Kinematic, Static)"
    type: string
    group: Simulation
    defaultValue: "Dynamic"
    showInUI: true

  - name: "Physics.Rigidbody.UseGravity"
    displayName: "Use Gravity"
    tooltip: "Apply gravitational forces"
    type: bool
    group: Simulation
    defaultValue: true
    showInUI: true

  - name: "Physics.Rigidbody.LinearDamping"
    displayName: "Linear Damping"
    tooltip: "Damping applied to linear velocity"
    type: float
    group: Simulation
    defaultValue: 0.0
    minValue: 0.0
    maxValue: 10.0
    dragSpeed: 0.1
    showInUI: true

  - name: "Physics.Rigidbody.AngularDamping"
    displayName: "Angular Damping"
    tooltip: "Damping applied to angular velocity"
    type: float
    group: Simulation
    defaultValue: 0.05
    minValue: 0.0
    maxValue: 10.0
    dragSpeed: 0.1
    showInUI: true

  - name: "Physics.Rigidbody.Constraints"
    displayName: "Constraints"
    tooltip: "Movement and rotation constraints"
    type: string_vector
    group: Simulation
    defaultValue: []
    showInUI: true

  - name: "Physics.Collider.Type"
    displayName: "Collider Type"
    tooltip: "Type of collision shape (Box, Sphere, Capsule, Mesh)"
    type: string
    group: Simulation
    defaultValue: "Mesh"
    showInUI: true

  - name: "Physics.Collider.IsTrigger"
    displayName: "Is Trigger"
    tooltip: "Collider acts as trigger (no physical collision)"
    type: bool
    group: Simulation
    defaultValue: false
    showInUI: true

  - name: "Physics.Collider.Offset"
    displayName: "Collider Offset"
    tooltip: "Offset from object center"
    type: vec3
    group: Simulation
    defaultValue: [0.0, 0.0, 0.0]
    showInUI: true

  - name: "Physics.Collider.Scale"
    displayName: "Collider Scale"
    tooltip: "Scale factor for collision shape"
    type: vec3
    group: Simulation
    defaultValue: [1.0, 1.0, 1.0]
    showInUI: true

  - name: "Physics.Collider.Friction"
    displayName: "Friction"
    tooltip: "Surface friction coefficient"
    type: float
    group: Simulation
    defaultValue: 0.5
    minValue: 0.0
    maxValue: 1.0
    dragSpeed: 0.01
    showInUI: true

  - name: "Physics.Collider.Restitution"
    displayName: "Restitution"
    tooltip: "Bounciness (0 = no bounce, 1 = perfectly elastic)"
    type: float
    group: Simulation
    defaultValue: 0.3
    minValue: 0.0
    maxValue: 1.0
    dragSpeed: 0.01
    showInUI: true

  - name: "Physics.Collider.Density"
    displayName: "Density"
    tooltip: "Material density (kg/m³)"
    type: float
    group: Simulation
    defaultValue: 1000.0
    minValue: 0.1
    maxValue: 100000.0
    dragSpeed: 100.0
    showInUI: true

  - name: "Physics.Collider.CollisionLayer"
    displayName: "Collision Layer"
    tooltip: "Layer this object belongs to"
    type: int
    group: Simulation
    defaultValue: 0
    minValue: 0
    maxValue: 31
    showInUI: true

  - name: "Physics.Collider.CollisionMask"
    displayName: "Collision Mask"
    tooltip: "Layers this object can collide with"
    type: int
    group: Simulation
    defaultValue: -1
    showInUI: true

  # BlackHole Parameters
  - name: "BlackHole.Spin"
    displayName: "Spin"
    tooltip: "Kerr spin parameter (0.0 to 1.0)"
    type: float
    group: Simulation
    defaultValue: 0.0
    minValue: 0.0
    maxValue: 1.0
    dragSpeed: 0.01
    showInUI: true

  - name: "BlackHole.SpinAxis"
    displayName: "Spin Axis"
    tooltip: "Rotation axis for Kerr black hole"
    type: vec3
    group: Simulation
    defaultValue: [0.0, 1.0, 0.0]
    showInUI: true

  # Mesh Parameters
  - name: "Mesh.FilePath"
    displayName: "Mesh File"
    tooltip: "Path to GLTF mesh file"
    type: string
    group: Simulation
    defaultValue: ""
    showInUI: true

  - name: "Mesh.ComOffset"
    displayName: "Center of Mass Offset"
    tooltip: "Offset from model origin to center of mass"
    type: vec3
    group: Simulation
    defaultValue: [0.0, 0.0, 0.0]
    scaleValueNames: ["m", "km", "AU", "ly"]
    scaleValues: [1.0, 1000.0, 149597870700.0, 9460730472580800.0]
    showInUI: true

  # Sphere Parameters
  - name: "Sphere.Radius"
    displayName: "Radius"
    tooltip: "Sphere radius"
    type: float
    group: Simulation
    defaultValue: 1.0
    minValue: 0.1
    maxValue: 1000.0
    dragSpeed: 0.1
    scaleValueNames: ["m", "km", "Mm"]
    scaleValues: [1.0, 1000.0, 1000000.0]
    showInUI: true

  - name: "Sphere.Color"
    displayName: "Color"
    tooltip: "Base color (RGB)"
    type: vec3
    group: Simulation
    defaultValue: [0.5, 0.5, 0.5]
    showInUI: true

  - name: "Sphere.TexturePath"
    displayName: "Texture"
    tooltip: "Path to texture file"
    type: string
    group: Simulation
    defaultValue: ""
    showInUI: true

  - name: "Sphere.Spin"
    displayName: "Spin Rate"
    tooltip: "Rotation speed"
    type: float
    group: Simulation
    defaultValue: 0.0
    minValue: 0.0
    maxValue: 10.0
    dragSpeed: 0.1
    showInUI: true

  - name: "Sphere.SpinAxis"
    displayName: "Spin Axis"
    tooltip: "Rotation axis"
    type: vec3
    group: Simulation
    defaultValue: [0.0, 1.0, 0.0]
    showInUI: true

  - name: "Video.RayTracingMode"
    displayName: "Ray Tracing Mode"
    tooltip: "0: Euclidean, 1: Kerr (Bent Rays)"
    type: int
    group: Video
    defaultValue: 0
    minValue: 0
    maxValue: 1
    showInUI: true

  - name: "Video.RayMarchSteps"
    displayName: "Max Steps"
    tooltip: "Maximum steps for ray marching"
    type: int
    group: Video
    defaultValue: 100
    minValue: 10
    maxValue: 1000
    dragSpeed: 1
    showInUI: true

  - name: "Video.RayMarchStepSize"
    displayName: "Step Size"
    tooltip: "Base step size for ray marching"
    type: float
    group: Video
    defaultValue: 0.1
    minValue: 0.01
    maxValue: 2.0
    dragSpeed: 0.01
    showInUI: true

